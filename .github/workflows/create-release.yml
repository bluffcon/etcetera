name: Create Release on Keyword (No Commit)

on:
  push:
    branches: [ main, master ]

env:
  GAME_VERSION: "26.1.x"

jobs:
  create-release:
    if: contains(github.event.head_commit.message, '!')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract version and full title from commit message
        id: extract
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          # Remove leading/trailing spaces and the '!' prefix
          RAW="${COMMIT_MSG#!}"
          RAW="${RAW#"${RAW%%[![:space:]]*}"}"  # trim leading spaces
          # First word after ! is the version
          VERSION=$(echo "$RAW" | awk '{print $1}')
          # Everything after the first word is the title (rest of message)
          TITLE=$(echo "$RAW" | cut -d' ' -f2-)
          # If no extra text, use version as title
          if [ -z "$TITLE" ]; then
            TITLE="$VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
          echo "Release title: $TITLE"
      
      - name: Get repository name
        id: repo
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          echo "name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "Repository name: $REPO_NAME"
      
      - name: Create zip files with modified pack.mcmeta
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          REPO_NAME="${{ steps.repo.outputs.name }}"
          
          # Create a temporary working directory
          mkdir -p working_dir
          
          # Copy all files to working directory
          cp -r * working_dir/ 2>/dev/null || true
          cp -r .[!.]* working_dir/ 2>/dev/null || true
          
          # Modify pack.mcmeta in working directory (replace XXX with version)
          sed -i "s/XXX/$VERSION/g" working_dir/pack.mcmeta
          
          cd working_dir
          
          # Create zip files from working directory
          if [ "$REPO_NAME" = "arbiterlib" ]; then
            echo "Repository is arbiterlib - creating two zip files"
            
            # Create full zip (with data folder) - this one gets published
            zip -r "../${REPO_NAME}_${VERSION}.zip" . -x "*.git*"
            
            # Create zip without data folder (prefixed with 'r') - manual use only
            # Remove the data folder first
            rm -rf data
            zip -r "../r${REPO_NAME}_${VERSION}.zip" . -x "*.git*"
            
            echo "Created: ${REPO_NAME}_${VERSION}.zip (will be published to Modrinth)"
            echo "Created: r${REPO_NAME}_${VERSION}.zip (manual use only)"
          else
            echo "Repository is $REPO_NAME - creating single zip file"
            
            # Create single zip with data folder
            zip -r "../${REPO_NAME}_${VERSION}.zip" . -x "*.git*"
            
            echo "Created: ${REPO_NAME}_${VERSION}.zip (will be published to Modrinth)"
          fi
          
          cd ..
          
          # Clean up
          rm -rf working_dir
          
          echo "Original files untouched, zips created successfully"
      
      - name: List created zip files
        run: |
          echo "Created zip files:"
          ls -la *.zip 2>/dev/null || echo "No zip files found"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.extract.outputs.version }}
          name: "${{ steps.extract.outputs.version }} - ${{ steps.extract.outputs.title }}"
          body: |
            Generated from commit by ${{ github.event.head_commit.author.name }}
            Commit: ${{ github.event.head_commit.url }}
            
            To use this script, make a commit called "!VERSION - other info" like "!a3" or "!r7 - Big Changes"
          files: |
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Read Modrinth project ID from pack.mcmeta
        id: modrinth_id
        run: |
          # Extract project ID from pack.mcmeta JSON field .info.modrinth_project_id
          PROJECT_ID=$(jq -r '.info.modrinth_project_id' pack.mcmeta)
          if [ "$PROJECT_ID" = "null" ] || [ -z "$PROJECT_ID" ]; then
            echo "No modrinth_project_id found in pack.mcmeta"
            exit 1
          fi
          echo "id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "Modrinth Project ID: $PROJECT_ID"
      
      - name: Determine loader(s) and main zip file
        id: modrinth_meta
        run: |
          REPO_NAME="${{ steps.repo.outputs.name }}"
          VERSION="${{ steps.extract.outputs.version }}"
          
          if [ "$REPO_NAME" = "arbiterlib" ]; then
            LOADERS='["minecraft", "datapack"]'
            MAIN_ZIP="${REPO_NAME}_${VERSION}.zip"
          else
            LOADERS='["datapack"]'
            MAIN_ZIP="${REPO_NAME}_${VERSION}.zip"
          fi
          
          echo "loaders=$LOADERS" >> $GITHUB_OUTPUT
          echo "main_zip=$MAIN_ZIP" >> $GITHUB_OUTPUT
      
      - name: Set dependencies for non-arbiterlib repos
        id: dependencies
        run: |
          REPO_NAME="${{ steps.repo.outputs.name }}"
          
          if [ "$REPO_NAME" != "arbiterlib" ]; then
            DEPENDENCIES='[{"project_id": "aHzaVmyo", "dependency_type": "required"}]'
            echo "dependencies=$DEPENDENCIES" >> $GITHUB_OUTPUT
            echo "dependencies set for $REPO_NAME"
          else
            echo "dependencies=" >> $GITHUB_OUTPUT
            echo "no dependencies for arbiterlib"
          fi
      
      - name: Publish to Modrinth
        if: success()
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: ${{ steps.modrinth_id.outputs.id }}
          version: ${{ steps.extract.outputs.version }}
          loaders: ${{ steps.modrinth_meta.outputs.loaders }}
          game-versions: ${{ env.GAME_VERSION }}
          files: ${{ steps.modrinth_meta.outputs.main_zip }}
          name: ${{ steps.extract.outputs.title }}
          dependencies: ${{ steps.dependencies.outputs.dependencies }}